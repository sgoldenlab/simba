
# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

conda:
  environment: docs/environment.yml
  
# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "mambaforge-4.10"
  jobs:
    # Read the Docs shallow-clones the repo, which leaves `git log --numstat`
    # (used by docs/conf.py to compute per-contributor lines-of-code for the
    # credits chart) with no history. Fetch full history so the line counts
    # populate. `|| true` keeps the build green if the repo is already complete.
    post_checkout:
      - git fetch --unshallow || true

# Build documentation in the docs/ directory with Sphinx
sphinx:
   configuration: docs/conf.py

# If using Sphinx, optionally build your docs in additional formats such as PDF
#formats:
#  - pdf


